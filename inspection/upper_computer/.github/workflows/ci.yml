name: ci

on:
  push:
  pull_request:

jobs:
  workspace_gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate workspace
        working-directory: upper_computer
        run: bash scripts/validate_workspace.sh

  ros_release_gate:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    env:
      ENABLE_ROS_RELEASE_GATE: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend release assets
        working-directory: upper_computer/frontend
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          npm run build:real
      - name: Validate ROS workspace
        working-directory: upper_computer
        run: bash scripts/validate_ros_workspace.sh
      - name: Run ROS runtime validation
        working-directory: upper_computer
        run: bash scripts/run_ros2_humble_runtime_validation.sh
