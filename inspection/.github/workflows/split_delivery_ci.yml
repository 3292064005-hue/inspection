name: split-delivery-ci

on:
  push:
  pull_request:

jobs:
  upper_computer_workspace_gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate upper computer workspace
        working-directory: upper_computer
        run: bash scripts/validate_workspace.sh

  upper_computer_ros_release_gate:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend release assets
        working-directory: upper_computer/frontend
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          npm run build:real
      - name: Run ROS 2 Humble release gate
        working-directory: upper_computer
        env:
          ENABLE_ROS_RELEASE_GATE: '1'
        run: |
          bash scripts/validate_ros_workspace.sh
          bash scripts/run_ros2_humble_runtime_validation.sh

  firmware_platformio_build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: PlatformIO build STM32
        working-directory: firmware/stm32_station_platformio
        run: platformio run
      - name: PlatformIO build ESP32-S3
        working-directory: firmware/esp32s3_camera_platformio
        run: platformio run

  firmware_contract_gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run firmware contract tests
        run: bash scripts/run_firmware_contract_tests.sh

  split_protocol_contract_gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate release versions
        run: python3 scripts/validate_release_versions.py
      - name: Validate runtime validation matrix
        run: python3 scripts/validate_runtime_validation_matrix.py --workspace-root .
      - name: Dry-run runtime validation matrix
        run: python3 scripts/run_runtime_validation_matrix.py --workspace-root . --skip-sim-execution --allow-missing-hardware-evidence
