[platformio]
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform = espressif32
board = esp32s3_n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.flash_size = 16MB
board_build.partitions = partitions/esp32s3_n16r8_littlefs.csv
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DBOARD_HAS_PSRAM
    -DINSPECTION_CAMERA_PRESET_XIAO_SENSE=1
    -DINSPECTION_FW_VERSION=\"esp32s3-camera-pio-v1\"
    -DINSPECTION_DEVICE_ID=\"esp32s3-cam-01\"

; Provision Wi-Fi/auth per deployment via build flags or platformio_override.ini
; Example:
;   -DINSPECTION_WIFI_SSID=\"factory-ssid\"
;   -DINSPECTION_WIFI_PASSWORD=\"factory-pass\"
;   -DINSPECTION_HTTP_AUTH_TOKEN=\"replace-with-token\"
;   -DINSPECTION_ALLOW_ANONYMOUS_HTTP=0
